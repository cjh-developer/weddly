<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weddly - 비밀번호 초기화</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-wrapper">
    <div class="phone-screen">

      <!-- 헤더 -->
      <div class="signup-header">
        <a href="login.html" class="back-btn" aria-label="뒤로가기">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </a>
        <div class="header-title-wrap">
          <span class="logo-small">weddly</span>
          <span class="header-title">비밀번호 초기화</span>
        </div>
        <div class="header-placeholder"></div>
      </div>

      <!-- 안내 문구 -->
      <div class="find-guide">
        <div class="find-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
            fill="none" stroke="#D4A96A" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <p class="find-guide-title">비밀번호를 잊으셨나요?</p>
        <p class="find-guide-desc">가입 시 등록한 아이디, 이메일, 전화번호가<br/>모두 일치하면 비밀번호를 초기화할 수 있어요.</p>
      </div>

      <!-- 입력 폼 -->
      <form class="find-form" id="resetPwForm" novalidate>

        <!-- 아이디 -->
        <div class="input-group">
          <label for="resetUserId">아이디 <span class="required">*</span></label>
          <div class="input-wrapper" id="resetUserIdWrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input type="text" id="resetUserId" placeholder="아이디를 입력하세요" maxlength="20" />
          </div>
          <p class="field-msg" id="resetUserIdMsg"></p>
        </div>

        <!-- 이메일 -->
        <div class="input-group">
          <label for="resetEmail">이메일 <span class="required">*</span></label>
          <div class="input-wrapper" id="resetEmailWrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input type="email" id="resetEmail" placeholder="가입한 이메일을 입력하세요" />
          </div>
          <p class="field-msg" id="resetEmailMsg"></p>
        </div>

        <!-- 전화번호 -->
        <div class="input-group">
          <label for="resetPhone">전화번호 <span class="required">*</span></label>
          <div class="input-wrapper" id="resetPhoneWrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </span>
            <input type="tel" id="resetPhone" placeholder="010-0000-0000" maxlength="13" />
          </div>
          <p class="field-msg" id="resetPhoneMsg"></p>
        </div>

        <!-- 비밀번호 초기화 버튼 -->
        <button type="submit" class="btn-login" id="resetPwBtn">비밀번호 초기화</button>

      </form>

      <!-- 결과 영역 (JS로 표시) -->
      <div class="find-result" id="resetResult">
        <div class="result-box result-box-reset">
          <div class="result-icon result-icon-reset">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
              fill="none" stroke="#D4A96A" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 2L11 13"/>
              <path d="M22 2L15 22 11 13 2 9l20-7z"/>
            </svg>
          </div>
          <p class="result-label">임시 비밀번호 발송 완료</p>
          <p class="result-email-sent" id="resultEmailSent"></p>
          <p class="result-notice">임시 비밀번호로 로그인 후<br/>반드시 비밀번호를 변경해주세요.</p>
        </div>
        <div class="result-actions">
          <a href="login.html" class="btn-login result-btn-login">로그인하러 가기</a>
        </div>
      </div>

      <!-- 하단 링크 -->
      <div class="find-bottom-links">
        <a href="login.html" class="bottom-link">로그인</a>
        <span class="forgot-divider">|</span>
        <a href="find_id.html" class="bottom-link">아이디 찾기</a>
        <span class="forgot-divider">|</span>
        <a href="signup.html" class="bottom-link">회원가입</a>
      </div>

      <p class="copyright">© 2025 Weddly. All rights reserved.</p>

    </div>
  </div>

  <script src="style.js"></script>
</body>
</html>
