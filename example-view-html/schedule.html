<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>weddly – 일정관리</title>
  <link rel="stylesheet" href="style.css" />
  <style>
  /* ══════════════════════════════
     Schedule Page
  ══════════════════════════════ */
  .sch-page {
    display: flex;
    flex-direction: column;
    height: 814px;
    position: relative;
    overflow: hidden;
  }

  /* ── 헤더 ── */
  .sch-header {
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }

  /* 상단 행: 로고 + 액션 아이콘들 */
  .sch-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px 10px;
    border-bottom: 1px solid #f5f5f5;
  }

  /* 하단 행: 기간 네비게이션 + 오늘 버튼 */
  .sch-header-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 18px 10px;
  }

  .sch-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sch-header-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sch-back {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #555;
    text-decoration: none;
    transition: background 0.15s;
  }
  .sch-back:hover { background: #ebebeb; }

  .sch-logo-small {
    font-size: 20px;
    font-weight: 800;
    color: #D4A96A;
    font-style: italic;
    letter-spacing: -0.5px;
  }

  /* 아이콘 버튼 (main.html 동일 스타일) */
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 11px;
    background: #f8f8f8;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #666;
    transition: background 0.15s, color 0.15s;
    position: relative;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: #f0e8d8; color: #D4A96A; }

  .notif-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 7px;
    height: 7px;
    background: #f44336;
    border-radius: 50%;
    border: 1.5px solid #fff;
  }

  /* 다크모드 토글 아이콘 전환 */
  .dark-toggle-btn .icon-sun  { display: none; }
  .dark-toggle-btn .icon-moon { display: block; }
  .phone-wrapper.dark .dark-toggle-btn .icon-moon { display: none; }
  .phone-wrapper.dark .dark-toggle-btn .icon-sun  { display: block; }
  .phone-wrapper.dark .dark-toggle-btn { background: #2e2616; color: #D4A96A; }
  .phone-wrapper.dark .dark-toggle-btn:hover { background: #3a3020; }

  .sch-period-nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sch-nav-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: none;
    cursor: pointer;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .sch-nav-btn:hover { background: #f0f0f0; }

  .sch-period-label {
    font-size: 14px;
    font-weight: 700;
    color: #222;
    min-width: 90px;
    text-align: center;
    white-space: nowrap;
  }

  .sch-today-btn {
    padding: 5px 11px;
    border: 1.5px solid #D4A96A;
    background: none;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #D4A96A;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .sch-today-btn:hover { background: #D4A96A; color: #fff; }

  /* ── 뷰 탭 ── */
  .sch-tabs {
    display: flex;
    background: #fafafa;
    border-bottom: 1px solid #f0f0f0;
    flex-shrink: 0;
  }

  .sch-tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 600;
    color: #bbb;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    font-family: inherit;
  }
  .sch-tab.active { color: #D4A96A; }
  .sch-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 2.5px;
    background: #D4A96A;
    border-radius: 2px;
  }

  /* ── 컨텐츠 영역 ── */
  .sch-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .sch-content::-webkit-scrollbar { display: none; }

  /* ══════════════════════════════
     월 뷰
  ══════════════════════════════ */
  .month-view { display: flex; flex-direction: column; }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 8px 12px 4px;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 3;
    border-bottom: 1px solid #f8f8f8;
  }

  .cal-weekday {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: #bbb;
    padding: 2px 0;
  }
  .cal-weekday.sun { color: #E8758A; }
  .cal-weekday.sat { color: #5B9BD5; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 4px 12px 0;
    gap: 2px 0;
  }

  .cal-cell {
    min-height: 52px;
    padding: 3px 2px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.12s;
    position: relative;
  }
  .cal-cell:hover { background: #f8f8f8; }

  .cal-day-num {
    width: 27px;
    height: 27px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    color: #333;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .cal-cell.today .cal-day-num {
    background: #D4A96A;
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(212,169,106,0.4);
  }
  .cal-cell.selected:not(.today) .cal-day-num {
    background: rgba(212,169,106,0.18);
    color: #C49050;
    font-weight: 700;
  }
  .cal-cell.other-month .cal-day-num { color: #d0d0d0; }
  .cal-cell.sun:not(.other-month) .cal-day-num { color: #E8758A; }
  .cal-cell.sat:not(.other-month) .cal-day-num { color: #5B9BD5; }
  .cal-cell.today .cal-day-num { color: #fff !important; }
  .cal-cell.other-month.sun .cal-day-num { color: rgba(232,117,138,0.3); }
  .cal-cell.other-month.sat .cal-day-num { color: rgba(91,155,213,0.3); }

  .cal-dots {
    display: flex;
    gap: 2px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 24px;
  }
  .cal-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* 선택된 날 이벤트 목록 */
  .month-events {
    padding: 14px 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #fafafa;
    border-top: 1.5px solid #f0f0f0;
  }

  .month-events-title {
    font-size: 13px;
    font-weight: 700;
    color: #888;
    padding-bottom: 6px;
  }
  .month-events-title span { color: #D4A96A; }

  /* ══════════════════════════════
     주 뷰
  ══════════════════════════════ */
  .week-view { display: flex; flex-direction: column; }

  .week-day-strip {
    display: flex;
    padding: 6px 8px 0;
    border-bottom: 1px solid #f0f0f0;
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 3;
  }

  .wdp {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 2px 8px;
    gap: 3px;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.12s;
  }
  .wdp:hover { background: #f8f8f8; }

  .wdp-name {
    font-size: 10px;
    font-weight: 600;
    color: #bbb;
    line-height: 1;
  }
  .wdp-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    transition: all 0.15s;
  }
  .wdp-dot { width: 5px; height: 5px; border-radius: 50%; }
  .wdp-dot-empty { width: 5px; height: 5px; }

  .wdp.today .wdp-num { background: #D4A96A; color: #fff; box-shadow: 0 2px 6px rgba(212,169,106,0.4); }
  .wdp.selected:not(.today) .wdp-num { background: rgba(212,169,106,0.18); color: #C49050; }
  .wdp.sun .wdp-name, .wdp.sun .wdp-num { color: #E8758A; }
  .wdp.sat .wdp-name, .wdp.sat .wdp-num { color: #5B9BD5; }
  .wdp.today .wdp-name { color: #D4A96A; }
  .wdp.today .wdp-num { color: #fff !important; }

  .week-day-group {
    padding: 12px 16px 4px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .week-group-date {
    font-size: 12px;
    font-weight: 700;
    color: #aaa;
    padding-bottom: 6px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .week-group-date.today-label { color: #D4A96A; }
  .week-group-date .today-badge {
    font-size: 10px;
    font-weight: 700;
    background: #D4A96A;
    color: #fff;
    padding: 1px 7px;
    border-radius: 10px;
  }

  .week-events-wrap { padding-bottom: 8px; }

  /* ══════════════════════════════
     일 뷰
  ══════════════════════════════ */
  .day-view { display: flex; flex-direction: column; }

  .day-date-banner {
    padding: 14px 20px 10px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 0;
    z-index: 3;
  }
  .day-date-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .day-date-big {
    font-size: 20px;
    font-weight: 800;
    color: #222;
  }
  .day-date-dow {
    font-size: 13px;
    color: #aaa;
    font-weight: 500;
  }
  .day-date-today-badge {
    font-size: 11px;
    font-weight: 700;
    color: #D4A96A;
    background: rgba(212,169,106,0.12);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .day-ev-count {
    font-size: 12px;
    color: #bbb;
    margin-top: 2px;
  }

  .day-time-list {
    display: flex;
    flex-direction: column;
    padding: 0 16px 100px;
  }

  .day-hour-row {
    display: flex;
    align-items: flex-start;
    min-height: 52px;
    padding: 8px 0;
    border-bottom: 1px solid #f9f9f9;
    gap: 12px;
  }
  .day-hour-row.has-event { border-bottom-color: #f0f0f0; }

  .day-hour-label {
    width: 42px;
    font-size: 11px;
    color: #ccc;
    font-weight: 500;
    flex-shrink: 0;
    padding-top: 2px;
    text-align: right;
  }

  .day-hour-events {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* 일 뷰 이벤트 칩 */
  .day-ev-chip {
    display: flex;
    align-items: center;
    gap: 9px;
    background: #fff;
    border-radius: 10px;
    padding: 9px 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .day-ev-chip:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); transform: translateY(-1px); }

  .day-ev-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .day-ev-title {
    font-size: 13px;
    font-weight: 600;
    color: #222;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .day-ev-time-txt {
    font-size: 11px;
    color: #bbb;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .day-ev-del {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    border: none;
    background: #fff2f2;
    color: #f44336;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .day-ev-del:hover { background: #ffcccc; }

  /* ══════════════════════════════
     공통 이벤트 아이템 (월/주 목록)
  ══════════════════════════════ */
  .ev-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border-radius: 12px;
    padding: 12px 12px 12px 14px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.07);
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .ev-item:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.1); transform: translateY(-1px); }
  .ev-item:active { transform: scale(0.98); }

  .ev-color-bar {
    width: 4px;
    border-radius: 2px;
    align-self: stretch;
    flex-shrink: 0;
    min-height: 36px;
  }
  .ev-info { flex: 1; min-width: 0; }
  .ev-title {
    font-size: 14px;
    font-weight: 600;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-meta {
    font-size: 12px;
    color: #aaa;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ev-del-btn {
    width: 30px;
    height: 30px;
    border-radius: 9px;
    border: none;
    background: #fff2f2;
    color: #f44336;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .ev-del-btn:hover { background: #ffcccc; }

  /* ── 빈 상태 ── */
  .no-ev {
    text-align: center;
    padding: 28px 20px;
    color: #ccc;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .no-ev-icon { font-size: 32px; }

  .empty-week {
    text-align: center;
    padding: 48px 20px;
    color: #ccc;
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .empty-week-icon { font-size: 40px; }

  /* ══════════════════════════════
     FAB 버튼
  ══════════════════════════════ */
  .sch-fab {
    position: absolute;
    bottom: 26px;
    right: 20px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, #D4A96A, #C49050);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(212,169,106,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .sch-fab:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(212,169,106,0.65); }
  .sch-fab:active { transform: scale(0.94); }

  /* ══════════════════════════════
     등록/수정 모달 (중앙 팝업)
  ══════════════════════════════ */
  .ev-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .ev-modal-overlay.active { display: flex; }

  .ev-sheet {
    background: #fff;
    border-radius: 20px;
    width: 100%;
    max-width: 360px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: modalIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
    overflow: hidden;
  }

  @keyframes modalIn {
    from { transform: scale(0.94) translateY(8px); opacity: 0; }
    to   { transform: scale(1)    translateY(0);   opacity: 1; }
  }

  .ev-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .ev-sheet-title {
    font-size: 16px;
    font-weight: 700;
    color: #222;
  }
  .ev-sheet-close {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    border: none;
    background: #f5f5f5;
    cursor: pointer;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .ev-sheet-close:hover { background: #ebebeb; }

  .ev-sheet-body {
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    flex: 1;
  }
  .ev-sheet-body::-webkit-scrollbar { display: none; }

  .ev-fg { display: flex; flex-direction: column; gap: 6px; }
  .ev-flabel { font-size: 13px; font-weight: 600; color: #555; }

  .ev-finput {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #e8e8e8;
    border-radius: 12px;
    font-size: 14px;
    color: #222;
    background: #f8f8f8;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    box-sizing: border-box;
  }
  .ev-finput:focus {
    border-color: #D4A96A;
    box-shadow: 0 0 0 3px rgba(212,169,106,0.15);
    background: #fff;
  }

  .ev-frow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* 색상 선택기 */
  .ev-colors {
    display: flex;
    gap: 10px;
    padding: 2px 0;
  }
  .ev-color-opt {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    border: none;
    transition: transform 0.15s;
    box-shadow: 0 0 0 2.5px transparent, 0 0 0 0 transparent;
  }
  .ev-color-opt:hover { transform: scale(1.1); }

  /* 개별 컬러 선택 상태는 JS에서 처리 */

  .ev-sheet-footer {
    padding: 12px 20px 16px;
    display: flex;
    gap: 10px;
    border-top: 1px solid #f0f0f0;
  }
  .ev-btn-cancel {
    padding: 13px 18px;
    background: #f5f5f5;
    color: #888;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .ev-btn-cancel:hover { background: #ebebeb; }
  .ev-btn-save {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, #D4A96A, #C49050);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    box-shadow: 0 3px 12px rgba(212,169,106,0.35);
    transition: opacity 0.2s, transform 0.1s;
  }
  .ev-btn-save:hover { opacity: 0.9; }
  .ev-btn-save:active { transform: scale(0.98); }

  /* ══════════════════════════════
     삭제 확인 모달
  ══════════════════════════════ */
  .del-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.48);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .del-modal-overlay.active { display: flex; }

  .del-box {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px 20px;
    width: 300px;
    text-align: center;
    animation: modalIn 0.22s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to   { opacity: 1; transform: scale(1)    translateY(0);   }

/* ══════════════════════════════
   유틸리티
══════════════════════════════ */
function toDateStr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function fromDateStr(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function pad(n) { return String(n).padStart(2,'0'); }
function isSameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function getEventsFor(dateStr) {
  return events.filter(e => e.date === dateStr)
               .sort((a,b) => (a.startTime||'99:99').localeCompare(b.startTime||'99:99'));
}
function fmtTime(t) {
  if (!t) return '';
  const [hStr, mStr] = t.split(':');
  const h = parseInt(hStr);
  return `${h<12?'오전':'오후'} ${h===0?12:h>12?h-12:h}:${mStr}`;
}
function getWeekStart(d) {
  const day = d.getDay();
  const s = new Date(d);
  s.setDate(d.getDate() - day);
  s.setHours(0,0,0,0);
  return s;
}

/* ══════════════════════════════
   뷰 렌더 디스패처
══════════════════════════════ */
function renderView() {
  updatePeriodLabel();
  if      (currentView === 'month') renderMonthView();
  else if (currentView === 'week')  renderWeekView();
  else                              renderDayView();
}

function updatePeriodLabel() {
  const el = document.getElementById('periodLabel');
  if (currentView === 'month') {
    el.textContent = `${viewDate.getFullYear()}년 ${MONTHS[viewDate.getMonth()]}`;
  } else if (currentView === 'week') {
    const ws = getWeekStart(viewDate);
    const we = new Date(ws); we.setDate(ws.getDate()+6);
    if (ws.getMonth() === we.getMonth()) {
      el.textContent = `${ws.getFullYear()}년 ${MONTHS[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}일`;
    } else {
      el.textContent = `${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;
    }
  } else {
    el.textContent = `${viewDate.getFullYear()}년 ${viewDate.getMonth()+1}월 ${viewDate.getDate()}일`;
  }
}

/* ══════════════════════════════
   월 뷰
══════════════════════════════ */
function renderMonthView() {
  const content = document.getElementById('schContent');
  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();

  const firstDay    = new Date(year, month, 1).getDay();
  const lastDate    = new Date(year, month+1, 0).getDate();
  const prevLast    = new Date(year, month, 0).getDate();

  let html = '<div class="month-view">';

  // 요일 헤더
  html += '<div class="cal-weekdays">';
  ['일','월','화','수','목','금','토'].forEach((d, i) => {
    const c = i===0 ? 'sun' : i===6 ? 'sat' : '';
    html += `<div class="cal-weekday ${c}">${d}</div>`;
  });
  html += '</div>';

  // 날짜 그리드
  html += '<div class="cal-grid">';

  // 이전 달 날짜
  for (let i = firstDay-1; i >= 0; i--) {
    const dn = prevLast - i;
    const dt = new Date(year, month-1, dn);
    html += calCell(dn, dt.getDay(), 'other-month', toDateStr(dt));
  }
  // 이번 달 날짜
  for (let d = 1; d <= lastDate; d++) {
    const dt = new Date(year, month, d);
    const dateStr = toDateStr(dt);
    const extra = [];
    if (isSameDay(dt, TODAY)) extra.push('today');
    if (isSameDay(dt, selDate)) extra.push('selected');
    html += calCell(d, dt.getDay(), extra.join(' '), dateStr);
  }
  // 다음 달 날짜
  const total = firstDay + lastDate;
  const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= rem; i++) {
    const dt = new Date(year, month+1, i);
    html += calCell(i, dt.getDay(), 'other-month', toDateStr(dt));
  }

  html += '</div>';

  // 선택된 날 이벤트 목록
  const selStr = toDateStr(selDate);
  const selEvs = getEventsFor(selStr);
  const dow = DAYS_KO[selDate.getDay()];
  const isToday = isSameDay(selDate, TODAY);

  html += '<div class="month-events">';
  html += `<div class="month-events-title">
    <span>${selDate.getMonth()+1}월 ${selDate.getDate()}일 (${dow})</span>
    ${isToday ? ' · 오늘' : ''}
    &nbsp;일정 <span>${selEvs.length}개</span>
  </div>`;

  if (selEvs.length === 0) {
    html += `<div class="no-ev"><div class="no-ev-icon">📅</div>등록된 일정이 없습니다</div>`;
  } else {
    selEvs.forEach(ev => { html += evItemHTML(ev); });
  }
  html += '</div></div>';

  content.innerHTML = html;
  bindEvItemEvents(content);
}

function calCell(day, dow, extra, dateStr) {
  let cls = 'cal-cell';
  if (extra) cls += ' ' + extra;
  if (dow === 0) cls += ' sun';
  if (dow === 6) cls += ' sat';

  const evList = getEventsFor(dateStr);
  let dotsHtml = '';
  if (evList.length > 0) {
    dotsHtml = '<div class="cal-dots">';
    const shown = Math.min(evList.length, 3);
    for (let i = 0; i < shown; i++) {
      dotsHtml += `<div class="cal-dot" style="background:${evList[i].color}"></div>`;
    }
    dotsHtml += '</div>';
  }

  return `<div class="${cls}" data-date="${dateStr}" onclick="onCalCellClick('${dateStr}')">
    <div class="cal-day-num">${day}</div>
    ${dotsHtml}
  </div>`;
}

function onCalCellClick(dateStr) {
  selDate = fromDateStr(dateStr);
  renderMonthView();
}

/* ══════════════════════════════
   주 뷰
══════════════════════════════ */
function renderWeekView() {
  const content = document.getElementById('schContent');
  const ws = getWeekStart(viewDate);

  let html = '<div class="week-view">';

  // 날짜 선택 스트립
  html += '<div class="week-day-strip">';
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const dateStr = toDateStr(d);
    const dayEvs  = getEventsFor(dateStr);
    const isToday = isSameDay(d, TODAY);
    const isSel   = isSameDay(d, viewDate);
    const dow     = d.getDay();
    let cls = 'wdp';
    if (isToday) cls += ' today';
    else if (isSel) cls += ' selected';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';

    const dotColor = dayEvs.length > 0 ? dayEvs[0].color : '';
    const dotHtml  = dotColor
      ? `<div class="wdp-dot" style="background:${dotColor}"></div>`
      : '<div class="wdp-dot-empty"></div>';

    html += `<div class="${cls}" onclick="onWeekDayClick('${dateStr}')">
      <span class="wdp-name">${DAYS_KO[dow]}</span>
      <span class="wdp-num">${d.getDate()}</span>
      ${dotHtml}
    </div>`;
  }
  html += '</div>';

  // 주간 이벤트 목록 (날짜별 그룹)
  let hasAny = false;
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    const dateStr = toDateStr(d);
    const dayEvs  = getEventsFor(dateStr);
    if (dayEvs.length === 0) continue;
    hasAny = true;

    const isToday = isSameDay(d, TODAY);
    const dow = DAYS_KO[d.getDay()];

    html += `<div class="week-day-group">
      <div class="week-group-date ${isToday ? 'today-label' : ''}">
        ${d.getMonth()+1}월 ${d.getDate()}일 (${dow})
        ${isToday ? '<span class="today-badge">오늘</span>' : ''}
      </div>
      <div class="week-events-wrap">`;
    dayEvs.forEach(ev => { html += evItemHTML(ev); });
    html += '</div></div>';
  }

  if (!hasAny) {
    html += `<div class="empty-week">
      <div class="empty-week-icon">📆</div>
      <div>이번 주 등록된 일정이 없습니다</div>
    </div>`;
  }

  html += '</div>';
  content.innerHTML = html;
  bindEvItemEvents(content);
}

function onWeekDayClick(dateStr) {
  viewDate = fromDateStr(dateStr);
  renderWeekView();
}

/* ══════════════════════════════
   일 뷰
══════════════════════════════ */
function renderDayView() {
  const content = document.getElementById('schContent');
  const dateStr  = toDateStr(viewDate);
  const dayEvs   = getEventsFor(dateStr);
  const dow      = DAYS_KO[viewDate.getDay()];
  const isToday  = isSameDay(viewDate, TODAY);

  let html = '<div class="day-view">';

  // 날짜 배너
  html += `<div class="day-date-banner">
    <div class="day-date-row">
      <span class="day-date-big">${viewDate.getFullYear()}년 ${viewDate.getMonth()+1}월 ${viewDate.getDate()}일</span>
      <span class="day-date-dow">${dow}요일</span>
      ${isToday ? '<span class="day-date-today-badge">오늘</span>' : ''}
    </div>
    <div class="day-ev-count">일정 ${dayEvs.length}개</div>
  </div>`;

  // 시간별 목록 (08:00 ~ 23:00, 이벤트 있는 시간대 강조)
  html += '<div class="day-time-list">';

  const START_H = 0, END_H = 23;
  for (let h = START_H; h <= END_H; h++) {
    const hourEvs = dayEvs.filter(ev => ev.startTime && parseInt(ev.startTime.split(':')[0]) === h);
    if (hourEvs.length === 0 && (h < 8 || h > 21)) continue;

    const cls = hourEvs.length > 0 ? 'day-hour-row has-event' : 'day-hour-row';
    html += `<div class="${cls}">
      <div class="day-hour-label">${pad(h)}:00</div>
      <div class="day-hour-events">`;

    hourEvs.forEach(ev => {
      const timeText = ev.startTime + (ev.endTime ? ` ~ ${ev.endTime}` : '');
      html += `<div class="day-ev-chip" onclick="openEditModal(${ev.id})">
        <div class="day-ev-dot" style="background:${ev.color}"></div>
        <div class="day-ev-title">${ev.title}</div>
        <div class="day-ev-time-txt">${timeText}</div>
        <button class="day-ev-del"
          onclick="event.stopPropagation(); openDeleteModal(${ev.id})" title="삭제">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M6 6L18 18M18 6L6 18" stroke="#f44336" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>`;
    });

    html += '</div></div>';
  }
  html += '</div></div>';

  content.innerHTML = html;
}

/* ══════════════════════════════
   공통 이벤트 아이템 HTML
══════════════════════════════ */
function evItemHTML(ev) {
  const timePart = ev.startTime
    ? fmtTime(ev.startTime) + (ev.endTime ? ` ~ ${fmtTime(ev.endTime)}` : '')
    : '';
  const metaParts = [timePart, ev.memo].filter(Boolean).join(' · ');

  return `<div class="ev-item" data-id="${ev.id}">
    <div class="ev-color-bar" style="background:${ev.color}"></div>
    <div class="ev-info">
      <div class="ev-title">${ev.title}</div>
      ${metaParts ? `<div class="ev-meta">${metaParts}</div>` : ''}
    </div>
    <button class="ev-del-btn" data-del-id="${ev.id}" title="삭제">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
        <path d="M6 6L18 18M18 6L6 18" stroke="#f44336" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>`;
}

function bindEvItemEvents(container) {
  // 아이템 클릭 → 수정 모달
  container.querySelectorAll('.ev-item').forEach(el => {
    el.addEventListener('click', () => openEditModal(Number(el.dataset.id)));
  });
  // 삭제 버튼 클릭
  container.querySelectorAll('.ev-del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openDeleteModal(Number(btn.dataset.delId));
    });
  });
}

/* ══════════════════════════════
   네비게이션
══════════════════════════════ */
document.getElementById('prevBtn').addEventListener('click', () => {
  if      (currentView === 'month') viewDate.setMonth(viewDate.getMonth()-1);
  else if (currentView === 'week')  viewDate.setDate(viewDate.getDate()-7);
  else                              viewDate.setDate(viewDate.getDate()-1);
  renderView();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  if      (currentView === 'month') viewDate.setMonth(viewDate.getMonth()+1);
  else if (currentView === 'week')  viewDate.setDate(viewDate.getDate()+7);
  else                              viewDate.setDate(viewDate.getDate()+1);
  renderView();
});

document.getElementById('todayBtn').addEventListener('click', () => {
  viewDate = new Date(TODAY);
  selDate  = new Date(TODAY);
  renderView();
});

/* ── 뷰 탭 전환 ── */
document.querySelectorAll('.sch-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.sch-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    // 일 뷰 전환 시 viewDate를 선택된 날짜로 동기화
    if (currentView !== 'month') viewDate = new Date(selDate);
    renderView();
  });
});

/* ── FAB ── */
document.getElementById('fabBtn').addEventListener('click', () => {
  const targetDate = (currentView === 'month') ? toDateStr(selDate) : toDateStr(viewDate);
  openAddModal(targetDate);
});

/* ══════════════════════════════
   등록/수정 모달
══════════════════════════════ */
function openAddModal(dateStr) {
  editingId = null;
  document.getElementById('evModalTitle').textContent = '일정 등록';
  document.getElementById('evTitle').value  = '';
  document.getElementById('evDate').value   = dateStr;
  document.getElementById('evStart').value  = '';
  document.getElementById('evEnd').value    = '';
  document.getElementById('evMemo').value   = '';
  setPickedColor('#D4A96A');
  document.getElementById('evModal').classList.add('active');
  document.getElementById('evTitle').focus();
}

function openEditModal(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingId = id;
  document.getElementById('evModalTitle').textContent = '일정 수정';
  document.getElementById('evTitle').value  = ev.title;
  document.getElementById('evDate').value   = ev.date;
  document.getElementById('evStart').value  = ev.startTime || '';
  document.getElementById('evEnd').value    = ev.endTime   || '';
  document.getElementById('evMemo').value   = ev.memo      || '';
  setPickedColor(ev.color);
  document.getElementById('evModal').classList.add('active');
  document.getElementById('evTitle').focus();
}

function setPickedColor(color) {
  pickedColor = color;
  document.querySelectorAll('.ev-color-opt').forEach(opt => {
    const isSelected = opt.dataset.color === color;
    if (isSelected) {
      opt.style.boxShadow = `0 0 0 2.5px #fff, 0 0 0 5px ${color}`;
      opt.style.transform = 'scale(1.15)';
    } else {
      opt.style.boxShadow = 'none';
      opt.style.transform = 'scale(1)';
    }
  });
}

document.querySelectorAll('.ev-color-opt').forEach(opt => {
  opt.addEventListener('click', () => setPickedColor(opt.dataset.color));
});

function closeEvModal() {
  document.getElementById('evModal').classList.remove('active');
  editingId = null;
}

document.getElementById('evModalClose').addEventListener('click', closeEvModal);
document.getElementById('evCancelBtn').addEventListener('click', closeEvModal);
document.getElementById('evModal').addEventListener('click', e => {
  if (e.target === document.getElementById('evModal')) closeEvModal();
});

document.getElementById('evSaveBtn').addEventListener('click', () => {
  const title = document.getElementById('evTitle').value.trim();
  const date  = document.getElementById('evDate').value;

  if (!title) {
    document.getElementById('evTitle').focus();
    document.getElementById('evTitle').style.borderColor = '#f44336';
    document.getElementById('evTitle').style.boxShadow  = '0 0 0 3px rgba(244,67,54,0.12)';
    setTimeout(() => {
      document.getElementById('evTitle').style.borderColor = '';
      document.getElementById('evTitle').style.boxShadow  = '';
    }, 1800);
    return;
  }
  if (!date) {
    document.getElementById('evDate').focus();
    return;
  }

  const evData = {
    id:        editingId || nextId++,
    title,
    date,
    startTime: document.getElementById('evStart').value || null,
    endTime:   document.getElementById('evEnd').value   || null,
    color:     pickedColor,
    memo:      document.getElementById('evMemo').value.trim(),
  };

  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    if (idx !== -1) events[idx] = evData;
  } else {
    events.push(evData);
  }

  // 등록 후 해당 날짜로 이동
  selDate  = fromDateStr(date);
  viewDate = new Date(selDate);

  closeEvModal();
  renderView();
});

// ESC로 모달 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeEvModal();
    closeDelModal();
  }
});

/* ══════════════════════════════
   삭제 확인 모달
══════════════════════════════ */
function openDeleteModal(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  deletingId = id;
  document.getElementById('delDesc').textContent =
    `"${ev.title}" 일정을 삭제하면 복구할 수 없습니다.`;
  document.getElementById('delModal').classList.add('active');
}

function closeDelModal() {
  document.getElementById('delModal').classList.remove('active');
  deletingId = null;
}

document.getElementById('delCancelBtn').addEventListener('click', closeDelModal);
document.getElementById('delModal').addEventListener('click', e => {
  if (e.target === document.getElementById('delModal')) closeDelModal();
});

document.getElementById('delConfirmBtn').addEventListener('click', () => {
  if (deletingId !== null) {
    events = events.filter(e => e.id !== deletingId);
    closeDelModal();
    renderView();
  }
});

/* ══════════════════════════════
   헤더 액션 버튼
══════════════════════════════ */
document.getElementById('darkToggleBtn').addEventListener('click', () => {
  document.querySelector('.phone-wrapper').classList.toggle('dark');
});

document.getElementById('notifBtn').addEventListener('click', () => {
  alert('알림 기능 연동 예정');
});

document.getElementById('profileBtn').addEventListener('click', () => location.href = 'user.html');

/* ══════════════════════════════
   초기 렌더
══════════════════════════════ */
renderView();
</script>
