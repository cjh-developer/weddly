<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weddly - 업체 둘러보기</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { align-items: flex-start; }

    .phone-wrapper {
      height: 844px;
      min-height: unset;
      position: relative;
      overflow: hidden;
    }

    .phone-screen {
      padding: 0 0 84px;
      min-height: unset;
      height: calc(844px - 30px);
      overflow-y: auto;
      display: block;
      position: relative;
    }

    .phone-screen::-webkit-scrollbar { width: 4px; }
    .phone-screen::-webkit-scrollbar-track { background: transparent; }
    .phone-screen::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #D4A96A, #C49050);
      border-radius: 4px;
    }
    .phone-wrapper.dark .phone-screen::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #3a2e1e, #2a2010);
    }

    /* ── 헤더 ── */
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 14px;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      z-index: 100;
      border-bottom: 1px solid #f5f5f5;
    }
    .main-logo {
      font-size: 24px;
      font-weight: 800;
      font-style: italic;
      color: #D4A96A;
      letter-spacing: -0.5px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 12px;
      background: #f8f8f8;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #666;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .icon-btn:hover { background: #f0e8d8; color: #D4A96A; }
    .icon-btn.heart-active { color: #f44336; background: #fff0f0; }

    /* 뒤로가기 (메인 헤더) */
    .header-back {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: #f8f8f8; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #666; text-decoration: none;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .header-back:hover { background: #f0e8d8; color: #D4A96A; }

    /* 저작권 */
    .vendor-copyright {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: #ccc;
      padding: 8px 20px 10px;
      letter-spacing: 0.2px;
      line-height: 1.8;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .dark-toggle-btn .icon-sun  { display: none; }
    .dark-toggle-btn .icon-moon { display: block; }
    .phone-wrapper.dark .dark-toggle-btn .icon-moon { display: none; }
    .phone-wrapper.dark .dark-toggle-btn .icon-sun  { display: block; }
    .phone-wrapper.dark .dark-toggle-btn { background: #2e2616; color: #D4A96A; }
    .phone-wrapper.dark .dark-toggle-btn:hover { background: #3a3020; }

    /* ── 카테고리 탭 ── */
    .category-wrap-outer {
      position: sticky;
      top: 68px;
      z-index: 90;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f5f5f5;
    }
    .category-wrap-outer::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 36px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.92));
      pointer-events: none;
      z-index: 1;
    }
    .phone-wrapper.dark .category-wrap-outer {
      background: rgba(21,18,14,0.97);
      border-bottom-color: #2a2418;
    }
    .phone-wrapper.dark .category-wrap-outer::after {
      background: linear-gradient(to right, transparent, rgba(21,18,14,0.92));
    }
    .category-wrap {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-wrap::-webkit-scrollbar { display: none; }
    .cat-tab {
      display: flex; align-items: center; gap: 4px;
      padding: 7px 13px;
      border-radius: 20px;
      border: 1.5px solid #e8e8e8;
      background: #fff;
      color: #888;
      font-size: 12px; font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .cat-tab:hover { border-color: #D4A96A; color: #D4A96A; background: #fffaf4; }
    .cat-tab.active {
      background: linear-gradient(135deg, #D4A96A, #C49050);
      border-color: transparent;
      color: #fff;
    }

    /* ── 검색바 ── */
    .search-wrap { padding: 12px 16px 8px; }
    .search-input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: #f8f8f8;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      padding: 0 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input-wrap:focus-within {
      border-color: #D4A96A;
      box-shadow: 0 0 0 3px rgba(212,169,106,0.15);
      background: #fff;
    }
    .search-icon { color: #bbb; flex-shrink: 0; }
    .search-input {
      flex: 1; border: none; background: transparent;
      padding: 12px 0; font-size: 14px; color: #222; outline: none;
    }
    .search-input::placeholder { color: #ccc; }

    /* ── 결과 요약 ── */
    .result-info { padding: 4px 16px 10px; font-size: 12px; color: #aaa; }

    /* ── 업체 리스트 ── */
    .vendor-list {
      padding: 0 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .vendor-card {
      display: flex; align-items: center; gap: 12px;
      background: #fff;
      border: 1.5px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .vendor-card:hover {
      border-color: #D4A96A;
      box-shadow: 0 2px 12px rgba(212,169,106,0.15);
    }
    .vendor-thumb {
      width: 58px; height: 58px;
      border-radius: 12px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #f7eedd, #eedbb5);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .vendor-info { flex: 1; min-width: 0; }
    .vendor-name {
      font-size: 14px; font-weight: 700; color: #222;
      margin-bottom: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vendor-desc {
      font-size: 12px; color: #888; margin-bottom: 7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vendor-meta { display: flex; align-items: center; gap: 10px; }
    .vendor-rating {
      display: flex; align-items: center; gap: 3px;
      font-size: 12px; font-weight: 700; color: #D4A96A;
    }
    .vendor-location {
      display: flex; align-items: center; gap: 3px;
      font-size: 11px; color: #aaa;
    }
    .card-heart-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: #f8f8f8;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ccc;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .card-heart-btn:hover { background: #fff0f0; color: #f44336; }
    .card-heart-btn.active { color: #f44336; background: #fff0f0; }

    /* ── 빈 화면 ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 10px; color: #ccc; text-align: center;
    }
    .empty-icon { font-size: 40px; }
    .empty-text { font-size: 14px; font-weight: 600; color: #bbb; }
    .empty-sub { font-size: 12px; color: #ccc; }

    /* ── 상세 오버레이 ── */
    .detail-overlay {
      position: absolute;
      inset: 0;
      background: #fff;
      z-index: 200;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 44px;
      overflow: hidden;
    }
    .detail-overlay.open { transform: translateY(0); }

    .detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 14px 12px;
      position: sticky; top: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      z-index: 210;
      border-bottom: 1px solid #f5f5f5;
      flex-shrink: 0;
    }
    .back-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: #f8f8f8; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #666; transition: all 0.15s;
    }
    .back-btn:hover { background: #f0e8d8; color: #D4A96A; }
    .detail-header-title {
      font-size: 15px; font-weight: 700; color: #222;
      flex: 1; text-align: center; margin: 0 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .detail-heart-btn {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: #f8f8f8; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #ccc; transition: all 0.15s;
    }
    .detail-heart-btn:hover { background: #fff0f0; color: #f44336; }
    .detail-heart-btn.active { background: #fff0f0; color: #f44336; }

    .detail-scroll {
      flex: 1; overflow-y: auto;
      scrollbar-width: thin;
    }
    .detail-scroll::-webkit-scrollbar { width: 4px; }
    .detail-scroll::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #D4A96A, #C49050);
      border-radius: 4px;
    }

    /* 대표 사진 영역 */
    .detail-hero {
      width: 100%; height: 210px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .detail-hero-emoji { font-size: 64px; position: relative; z-index: 1; }
    .detail-hero-badge {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.5);
      color: #fff; font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px; z-index: 2;
    }

    /* 상세 탭 */
    .detail-tabs {
      display: flex;
      border-bottom: 1px solid #f0f0f0;
      position: sticky; top: 65px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      z-index: 205;
      flex-shrink: 0;
    }
    .detail-tab {
      flex: 1; padding: 13px 0;
      text-align: center;
      font-size: 13px; font-weight: 600; color: #aaa;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .detail-tab.active { color: #D4A96A; border-bottom-color: #D4A96A; }

    /* 업체 정보 탭 */
    .info-section { padding: 18px 16px; }
    .info-name { font-size: 20px; font-weight: 800; color: #222; margin-bottom: 8px; }
    .info-desc-text { font-size: 13px; line-height: 1.75; color: #666; margin-bottom: 16px; }
    .info-rating-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 18px;
    }
    .info-stars { color: #D4A96A; font-size: 16px; letter-spacing: 1px; }
    .info-rating-num { font-size: 20px; font-weight: 800; color: #222; }
    .info-review-count { font-size: 12px; color: #aaa; }
    .info-divider { height: 1px; background: #f5f5f5; margin: 4px 0 18px; }
    .info-row {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
    }
    .info-row-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f7eedd, #eedbb5);
      color: #C49050;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .info-row-content { flex: 1; padding-top: 2px; }
    .info-row-label { font-size: 11px; color: #aaa; margin-bottom: 3px; }
    .info-row-value { font-size: 13px; color: #333; font-weight: 500; }
    .info-row-link { color: #D4A96A; text-decoration: none; }

    /* 지도 */
    .map-box {
      height: 130px;
      background: #e8f5e9;
      border-radius: 12px;
      border: 1.5px solid #c8e6c9;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; color: #5BAD7F;
      cursor: pointer; margin-top: 10px;
      position: relative; overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .map-box:hover { box-shadow: 0 4px 14px rgba(91,173,127,0.2); }
    .map-grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(91,173,127,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,173,127,0.12) 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .map-pin-wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .map-open-label {
      position: absolute; bottom: 8px; right: 8px;
      background: #fff;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px; color: #5BAD7F;
      font-weight: 600; z-index: 1;
    }

    /* 리뷰 탭 */
    .review-sub-tabs {
      display: flex; gap: 7px;
      padding: 14px 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .review-sub-tabs::-webkit-scrollbar { display: none; }
    .review-sub-tab {
      display: flex; align-items: center; gap: 4px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #e8e8e8;
      background: #fff; color: #888;
      font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s; flex-shrink: 0;
    }
    .review-sub-tab.active {
      background: linear-gradient(135deg, #D4A96A, #C49050);
      border-color: transparent; color: #fff;
    }
    .review-sub-tab:not(.active):hover { border-color: #D4A96A; color: #D4A96A; }
    .review-sub-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 16px; height: 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.3);
      font-size: 10px; padding: 0 4px;
    }
    .review-sub-tab:not(.active) .review-sub-count { background: #f0f0f0; color: #999; }

    .review-list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .review-card {
      background: #fafafa;
      border: 1.5px solid #f0f0f0;
      border-radius: 14px;
      padding: 14px;
    }
    .review-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 9px;
    }
    .reviewer-info { display: flex; align-items: center; gap: 8px; }
    .reviewer-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4A96A, #C49050);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 11px; font-weight: 700;
    }
    .reviewer-name { font-size: 13px; font-weight: 600; color: #333; }
    .reviewer-date { font-size: 11px; color: #bbb; margin-top: 1px; }
    .review-stars { color: #D4A96A; font-size: 12px; letter-spacing: 1px; }
    .review-text { font-size: 13px; line-height: 1.65; color: #555; }
    .review-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 10px; font-weight: 600;
      margin-top: 9px;
    }
    .review-badge.blog { background: #e8f0fe; color: #5B8AF0; }
    .review-badge.receipt { background: #e8f5e9; color: #5BAD7F; }
    .review-badge.visit { background: #fff8ef; color: #C49050; }

    /* 사진 탭 */
    .photos-header { padding: 14px 16px 8px; font-size: 12px; color: #aaa; }
    .photos-grid {
      padding: 0 16px 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
        }
    .photo-item {
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .photo-item:hover { opacity: 0.85; }
    .photo-bg {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    /* ── 즐겨찾기 오버레이 ── */
    .fav-overlay {
      position: absolute; inset: 0;
      background: #fff;
      z-index: 150;
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 44px;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .fav-overlay.open { transform: translateX(0); }

    .fav-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 12px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      z-index: 155;
      border-bottom: 1px solid #f5f5f5;
      flex-shrink: 0;
    }
    .fav-title { font-size: 17px; font-weight: 700; color: #222; }
    .fav-count-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 13px; font-weight: 600; color: #D4A96A;
      background: #fff8ef; border-radius: 20px; padding: 4px 10px;
    }
    .fav-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }
    .fav-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 320px; gap: 12px;
    }
    .fav-empty-icon { font-size: 52px; }
    .fav-empty-text { font-size: 15px; font-weight: 600; color: #bbb; }
    .fav-empty-sub { font-size: 12px; color: #ccc; text-align: center; line-height: 1.6; }

    /* ════════════════════════
       다크모드
    ════════════════════════ */

    /* ── 폰 프레임 / 배경 ── */
    .phone-wrapper.dark {
      background: #15120e;
      box-shadow: 0 0 0 2px #2e2820, 0 20px 60px rgba(0,0,0,0.55);
    }
    .phone-wrapper.dark .phone-screen { background: #15120e; }

    /* ── 헤더 ── */
    .phone-wrapper.dark .main-header {
      background: rgba(21,18,14,0.97);
      border-bottom-color: #2a2418;
    }
    .phone-wrapper.dark .main-logo { color: #D4A96A; }
    .phone-wrapper.dark .header-back { background: #26201a; color: #7a7068; }
    .phone-wrapper.dark .header-back:hover { background: #342c22; color: #D4A96A; }
    .phone-wrapper.dark .icon-btn { background: #26201a; color: #7a7068; }
    .phone-wrapper.dark .icon-btn:hover { background: #342c22; color: #D4A96A; }
    .phone-wrapper.dark .icon-btn.heart-active { background: #3a1a1a; color: #f44336; }
    .phone-wrapper.dark .dark-toggle-btn { background: #2e2616; color: #D4A96A; }
    .phone-wrapper.dark .dark-toggle-btn:hover { background: #3a3020; }

    /* ── 카테고리 탭 ── */
    .phone-wrapper.dark .cat-tab { background: #1e1a14; border-color: #2e2818; color: #5a5040; }
    .phone-wrapper.dark .cat-tab:hover { border-color: #D4A96A; color: #D4A96A; background: #26201a; }
    .phone-wrapper.dark .cat-tab.active {
      background: linear-gradient(135deg, #D4A96A, #C49050);
      border-color: transparent; color: #fff;
    }

    /* ── 검색 ── */
    .phone-wrapper.dark .search-input-wrap { background: #26201a; border-color: #2e2818; }
    .phone-wrapper.dark .search-input-wrap:focus-within { border-color: #D4A96A; background: #1e1a14; }
    .phone-wrapper.dark .search-input { color: #ede8e0; }
    .phone-wrapper.dark .search-input::placeholder { color: #3a3020; }
    .phone-wrapper.dark .search-icon { color: #3a3020; }
    .phone-wrapper.dark .result-info { color: #4a4030; }

    /* ── 업체 카드 ── */
    .phone-wrapper.dark .vendor-card { background: #1e1a14; border-color: #2e2818; }
    .phone-wrapper.dark .vendor-card:hover { border-color: #D4A96A; box-shadow: 0 2px 12px rgba(212,169,106,0.08); }
    .phone-wrapper.dark .vendor-name { color: #ede8e0; }
    .phone-wrapper.dark .vendor-desc { color: #5a5040; }
    .phone-wrapper.dark .vendor-thumb { background: linear-gradient(135deg, #26201a, #342c22); }
    .phone-wrapper.dark .vendor-location { color: #4a4030; }
    .phone-wrapper.dark .card-heart-btn { background: #26201a; color: #3a3020; }
    .phone-wrapper.dark .card-heart-btn:hover { background: #3a1a1a; color: #f44336; }
    .phone-wrapper.dark .card-heart-btn.active { background: #3a1a1a; color: #f44336; }

    /* ── 빈 상태 ── */
    .phone-wrapper.dark .empty-text { color: #4a4030; }
    .phone-wrapper.dark .empty-sub { color: #3a3020; }

    /* ── 저작권 ── */

    .review-fab {

      bottom: 16px; right: 16px;
      z-index: 215;

      padding: 8px 13px 8px 10px;

      color: #fff; font-size: 12px; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(196,144,80,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .review-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(196,144,80,0.55); }
    .review-fab:active { transform: scale(0.95); }

    .review-sheet {
      position: absolute; inset: 0; z-index: 220;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .review-sheet.open { pointer-events: all; }
    .review-backdrop {
      position: absolute; inset: 0;
      background: transparent;
      transition: background 0.25s;
      cursor: pointer;
    }
    .review-sheet.open .review-backdrop { background: rgba(0,0,0,0.45); }
    .review-panel {
      position: relative;
      background: #fff;
      border-radius: 20px;
      padding-bottom: 20px;
      width: calc(100% - 32px);
      max-height: 80%;
      overflow-y: auto;
      scrollbar-width: none;
      transform: scale(0.88);
      opacity: 0;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
    }
    .review-panel::-webkit-scrollbar { display: none; }
    .review-sheet.open .review-panel { transform: scale(1); opacity: 1; }

    .review-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .review-panel-title { font-size: 16px; font-weight: 800; color: #222; }
    .review-close-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: #f0f0f0; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: #888;
      transition: background 0.15s;
    }
    .review-close-btn:hover { background: #e0e0e0; }

    .review-type-list {
      padding: 4px 16px 8px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .review-type-card {
      display: flex; align-items: center; gap: 14px;
      padding: 16px; border-radius: 14px;
      border: 1.5px solid #f0f0f0; background: #fff;
      cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .review-type-card:hover {
      border-color: #D4A96A;
      box-shadow: 0 2px 12px rgba(212,169,106,0.15);
    }
    .review-type-icon {
      width: 46px; height: 46px; border-radius: 13px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .review-type-icon.receipt { background: #e8f5e9; }
    .review-type-icon.visit   { background: #fff8ef; }
    .review-type-text { flex: 1; }
    .review-type-name { font-size: 14px; font-weight: 700; color: #222; margin-bottom: 3px; }
    .review-type-desc { font-size: 12px; color: #aaa; }

    .review-form-wrap { padding: 0 16px 4px; display: none; }
    .review-form-wrap.show { display: block; }
    .review-type-label-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600; margin-bottom: 16px;

    .review-field-label { font-size: 12px; color: #aaa; font-weight: 600; margin-bottom: 8px; }
    .review-stars-input { display: flex; gap: 4px; margin-bottom: 16px; }
    .review-star-btn {
      font-size: 28px; cursor: pointer;

      line-height: 1; transition: color 0.15s, transform 0.1s;
    }
    .review-star-btn.lit { color: #D4A96A; }
    .review-star-btn:hover { transform: scale(1.15); }

    .review-textarea {
      width: 100%; min-height: 110px;

      padding: 12px 14px; font-size: 13px; color: #333;

    .review-textarea:focus { border-color: #D4A96A; }
    .review-textarea::placeholder { color: #ccc; }

    .review-photo-btn {

      transition: border-color 0.2s, color 0.2s;
    }
    .review-photo-btn:hover { border-color: #D4A96A; color: #D4A96A; }

    .review-submit-btn {
      width: 100%; padding: 13px;

/* ── 즐겨찾기 상태 ── */
let favorites = new Set();

/* ── 현재 카테고리 ── */
let currentCat = '예식장';

/* ── 카테고리 선택 ── */
function selectCat(btn, cat) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentCat = cat;
  document.getElementById('searchInput').value = '';
  renderVendors('');
}

/* ── 검색 ── */
function filterVendors() {
  renderVendors(document.getElementById('searchInput').value.trim());
}

/* ── 업체 카드 렌더링 ── */
function heartSVG(filled) {
  const f = filled ? '#f44336' : 'none';
  const s = filled ? '#f44336' : 'currentColor';
  return `<svg width="14" height="14" viewBox="0 0 24 24" fill="${f}" stroke="${s}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>`;
}

function locSVG() {
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
  </svg>`;
}

function vendorCardHTML(v, onClickFn) {
  const isFav = favorites.has(v.id);
  return `<div class="vendor-card" onclick="${onClickFn}(${v.id})">
    <div class="vendor-thumb">${v.emoji}</div>
    <div class="vendor-info">
      <div class="vendor-name">${v.name}</div>
      <div class="vendor-desc">${v.desc}</div>
      <div class="vendor-meta">
        <div class="vendor-rating">★ ${v.rating}</div>
        <div class="vendor-location">${locSVG()} ${v.location}</div>
      </div>
    </div>
    <button class="card-heart-btn ${isFav ? 'active' : ''}"
      id="heart-${v.id}"
      onclick="event.stopPropagation(); toggleFav(${v.id})">${heartSVG(isFav)}</button>
  </div>`;
}

function renderVendors(q) {
  const vendors = (VENDORS[currentCat] || []).filter(v =>
    !q || v.name.includes(q) || v.location.includes(q) || v.desc.includes(q)
  );
  const list = document.getElementById('vendorList');
  const info = document.getElementById('resultInfo');
  info.textContent = `${currentCat} ${vendors.length}곳`;
  if (!vendors.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">검색 결과가 없어요</div><div class="empty-sub">다른 검색어를 입력해보세요</div></div>`;
    return;
  }
  list.innerHTML = vendors.map(v => vendorCardHTML(v, 'openDetail')).join('');
}

/* ── 즐겨찾기 토글 ── */
function toggleFav(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  syncHeartBtn(id);
  updateFavHeaderBtn();
}

function syncHeartBtn(id) {
  const isFav = favorites.has(id);
  const btn = document.getElementById('heart-' + id);
  if (!btn) return;
  btn.className = 'card-heart-btn' + (isFav ? ' active' : '');
  btn.innerHTML = heartSVG(isFav);
}

function updateFavHeaderBtn() {
  const btn = document.getElementById('favHeaderBtn');
  if (favorites.size > 0) btn.classList.add('heart-active');
  else btn.classList.remove('heart-active');
  document.getElementById('favCount').textContent = favorites.size + '곳';
}

/* ── 상세화면 ── */
let currentVendorId = null;

function getAllVendors() {
  return Object.values(VENDORS).flat();
}

function starsStr(rating) {
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function openDetail(id) {
  const v = getAllVendors().find(x => x.id === id);
  if (!v) return;
  currentVendorId = id;

  // 헤더
  document.getElementById('detailTitle').textContent = v.name;

  // 히어로
  const hero = document.getElementById('detailHero');
  hero.style.background = v.heroGrad;
  document.getElementById('detailHeroEmoji').textContent = v.emoji;

  // 업체 정보
  document.getElementById('infoName').textContent = v.name;
  document.getElementById('infoDesc').textContent = v.fullDesc;
  document.getElementById('infoStars').textContent = starsStr(v.rating);
  document.getElementById('infoRatingNum').textContent = v.rating;
  document.getElementById('infoReviewCount').textContent = `(리뷰 ${v.reviewCount}개)`;
  document.getElementById('infoPhone').textContent = v.phone;
  document.getElementById('infoWebsite').textContent = v.website;
  document.getElementById('infoAddress').textContent = v.address;

  // 하트 상태
  updateDetailHeart();

  // 탭 초기화
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.detail-tab').classList.add('active');
  ['info','review','photos'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === 'info' ? 'block' : 'none';
  });

  // 리뷰 초기화
  document.querySelectorAll('.review-sub-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.review-sub-tab').classList.add('active');
  renderReviewList('blog');

  // 사진
  renderPhotos();

  document.getElementById('detailScroll').scrollTop = 0;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentVendorId = null;
}

function updateDetailHeart() {
  const isFav = favorites.has(currentVendorId);
  const btn = document.getElementById('detailHeartBtn');
  const icon = document.getElementById('detailHeartIcon');
  btn.className = 'detail-heart-btn' + (isFav ? ' active' : '');
  icon.setAttribute('fill', isFav ? '#f44336' : 'none');
  icon.setAttribute('stroke', isFav ? '#f44336' : 'currentColor');
}

function toggleDetailHeart() {
  if (!currentVendorId) return;
  if (favorites.has(currentVendorId)) favorites.delete(currentVendorId);
  else favorites.add(currentVendorId);
  updateDetailHeart();
  updateFavHeaderBtn();
  syncHeartBtn(currentVendorId);
}

/* ── 상세 탭 전환 ── */
function switchDetailTab(el, tab) {
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['info','review','photos'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none';
  });
}

  { bg:'linear-gradient(135deg,#d0e8ff,#5B8AF0)', e:'💒' },
  { bg:'linear-gradient(135deg,#ede8ff,#9C6BC4)', e:'📷' },
  { bg:'linear-gradient(135deg,#ffe8d0,#E07070)', e:'🌸' },
  { bg:'linear-gradient(135deg,#f7eedd,#C49050)', e:'💌' },
  { bg:'linear-gradient(135deg,#ffd6e0,#D4A96A)', e:'🎊' },
  { bg:'linear-gradient(135deg,#d0f0e8,#5BAD7F)', e:'🌹' },
  { bg:'linear-gradient(135deg,#f0eaff,#D4A96A)', e:'✨' },
  { bg:'linear-gradient(135deg,#d0e8ff,#5B8AF0)', e:'🎂' },
];

function renderPhotos() {
  const grid = document.getElementById('photosGrid');
  const hdr = document.getElementById('photosHeader');
  hdr.textContent = `리뷰 사진 ${PHOTO_STYLES.length}장`;
  grid.innerHTML = PHOTO_STYLES.map(p =>
    `<div class="photo-item" onclick="alert('사진을 크게 봅니다')">
       <div class="photo-bg" style="background:${p.bg}">${p.e}</div>
     </div>`
  ).join('');
}

/* ── 즐겨찾기 화면 ── */
function openFav() {
  renderFavList();
  document.getElementById('favOverlay').classList.add('open');
}

function closeFav() {
  document.getElementById('favOverlay').classList.remove('open');
}

function renderFavList() {
  const favVendors = getAllVendors().filter(v => favorites.has(v.id));
  const list = document.getElementById('favList');
  const empty = document.getElementById('favEmpty');
  document.getElementById('favCount').textContent = favVendors.length + '곳';

  if (!favVendors.length) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }
  list.style.display = 'flex';
  empty.style.display = 'none';

  list.innerHTML = favVendors.map(v => {
    const isFav = true;
    return `<div class="vendor-card" onclick="openFavDetail(${v.id})">
      <div class="vendor-thumb">${v.emoji}</div>
      <div class="vendor-info">
        <div class="vendor-name">${v.name}</div>
        <div class="vendor-desc">${v.desc}</div>
        <div class="vendor-meta">
          <div class="vendor-rating">★ ${v.rating}</div>
          <div class="vendor-location">${locSVG()} ${v.location}</div>
        </div>
      </div>
      <button class="card-heart-btn active" onclick="event.stopPropagation(); removeFav(${v.id})">${heartSVG(true)}</button>
    </div>`;
  }).join('');
}

function removeFav(id) {
  favorites.delete(id);
  updateFavHeaderBtn();
  renderFavList();
  renderVendors(document.getElementById('searchInput').value.trim());
}

function openFavDetail(id) {
  closeFav();
  setTimeout(() => openDetail(id), 100);
}

/* ── 리뷰 등록 시트 ── */
let reviewStar = 0;

function openReviewSheet() {
  reviewStar = 0;
  document.getElementById('reviewTypeList').style.display = 'flex';
  document.getElementById('reviewFormWrap').classList.remove('show');
  document.getElementById('reviewPanelTitle').textContent = '리뷰 유형 선택';
  document.getElementById('reviewTextarea').value = '';
  document.querySelectorAll('.review-star-btn').forEach(b => b.classList.remove('lit'));
  document.getElementById('reviewSheet').classList.add('open');
}

function closeReviewSheet() {
  document.getElementById('reviewSheet').classList.remove('open');
}

function selectReviewType(type) {
  document.getElementById('reviewTypeList').style.display = 'none';
  document.getElementById('reviewFormWrap').classList.add('show');
  const tag = document.getElementById('reviewTypeTag');
  if (type === 'receipt') {
    tag.textContent = '🧾 영수증 리뷰';
    tag.className = 'review-type-label-tag receipt';
    document.getElementById('reviewPanelTitle').textContent = '영수증 리뷰 작성';
  } else {
    tag.textContent = '📍 방문 리뷰';
    tag.className = 'review-type-label-tag visit';
    document.getElementById('reviewPanelTitle').textContent = '방문 리뷰 작성';
  }
}

function setReviewStar(n) {
  reviewStar = n;
  document.querySelectorAll('.review-star-btn').forEach(b => {
    b.classList.toggle('lit', parseInt(b.dataset.v) <= n);
  });
}

function submitReview() {
  if (reviewStar === 0) { alert('별점을 선택해주세요.'); return; }
  if (document.getElementById('reviewTextarea').value.trim().length < 10) {
    alert('리뷰 내용을 10자 이상 작성해주세요.'); return;
  }
  closeReviewSheet();
  setTimeout(() => alert('리뷰가 등록되었습니다! 감사합니다 😊'), 350);
}

/* ── 초기화 ── */
(function() {
  const initCat = localStorage.getItem('weddly-init-cat');
  if (initCat && VENDORS[initCat]) {
    localStorage.removeItem('weddly-init-cat');
    currentCat = initCat;
    document.querySelectorAll('.cat-tab').forEach(btn => {
      const match = btn.getAttribute('onclick').includes(`'${initCat}'`);
      btn.classList.toggle('active', match);
    });
  }
  renderVendors('');
})();
</script>
